<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INDIPLEX - Watch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="margin-bottom: 20px;">
    <input type="text" id="search-input" placeholder="Search Movies/Shows..." 
           style="width: 100%; padding: 12px; background: #181818; border: 1px solid #444; border-radius: 8px; color: white;">
    <div id="search-results" style="position: absolute; width: 95%; z-index: 1000; background: #121212; border-radius: 8px; margin-top: 5px;"></div>
</div>
    <div class="watch-container">
        <div class="player-section">
            <iframe 
                id="main-player" 
                src="" 
                frameborder="0" 
                allowfullscreen
                allow="autoplay; fullscreen; picture-in-picture"
                referrerpolicy="no-referrer">
            </iframe>
        </div>
        <div class="server-container">
            <span class="server-label">Servers:</span>
            <div id="server-list" class="server-list">
                <button class="server-btn active" data-server="vidlink"  onclick="switchServer('vidlink')">VidLink ⭐</button>
                <button class="server-btn"        data-server="vidsrc"   onclick="switchServer('vidsrc')">VidSrc</button>
                <button class="server-btn"        data-server="vidsrccc" onclick="switchServer('vidsrccc')">VidSrc CC</button>
                <button class="server-btn"        data-server="twoembed" onclick="switchServer('twoembed')">2Embed</button>
                <button class="server-btn"        data-server="vidfast"  onclick="switchServer('vidfast')">VidFast</button>
            </div>
        </div>
        <div class="episodes-wrapper">
            <div class="episodes-header">
                <h2>Episodes</h2>
                <span id="episode-count">0 episodes</span>
            </div>
            <div id="season-chips" class="season-selector"></div>
            <div id="episode-grid" class="episode-grid"></div>
        </div>
    </div>
    <script src="engine.js"></script>
</body>
</html>
