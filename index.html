<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFlix — Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
    <a href="https://v0-netflix-homepage-clone.vercel.app" class="nav-logo">
        <span class="logo-text">AURA<span class="logo-accent">FLIX</span></span>
    </a>
    <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Search movies, shows..." autocomplete="off">
        <div id="search-results" class="search-dropdown"></div>
    </div>
    <div class="nav-right">
        <span id="show-title-nav" class="nav-show-title"></span>
    </div>
</nav>

<!-- MAIN -->
<div class="app-layout">

    <!-- PLAYER COLUMN -->
    <div class="player-column">

        <!-- Show Info Bar -->
        <div class="show-info-bar" id="show-info-bar">
            <div class="show-info-left">
                <div class="show-poster-mini" id="show-poster-mini"></div>
                <div class="show-meta">
                    <h1 class="show-title" id="show-title">Loading...</h1>
                    <div class="show-tags">
                        <span class="tag tag-rating" id="show-rating"></span>
                        <span class="tag tag-year" id="show-year"></span>
                        <span class="tag tag-type" id="show-type"></span>
                        <span class="tag tag-ep" id="current-ep-tag"></span>
                    </div>
                </div>
            </div>
            <div class="ep-nav-btns">
                <button class="ep-nav-btn" id="prev-ep-btn" onclick="prevEpisode()" title="Previous Episode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                    <span>Prev</span>
                </button>
                <button class="ep-nav-btn" id="next-ep-btn" onclick="nextEpisode()" title="Next Episode">
                    <span>Next</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </div>

        <!-- Player Frame -->
        <div class="player-wrap">
            <div class="player-glow"></div>
            <iframe
                id="main-player"
                src=""
                frameborder="0"
                allowfullscreen
                allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
                referrerpolicy="no-referrer">
            </iframe>
            <div class="player-loader" id="player-loader">
                <div class="loader-ring"></div>
                <span class="loader-text">Loading stream...</span>
            </div>
        </div>

        <!-- Server Bar -->
        <div class="server-bar">
            <div class="server-bar-left">
                <span class="server-label-txt">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
                    Stream Source
                </span>
            </div>
            <div class="server-chips" id="server-list">
                <button class="s-chip active" data-server="vidsrc" onclick="switchServer('vidsrc')">
                    <span class="s-dot"></span>VidSrc
                </button>
                <button class="s-chip" data-server="vidsrccc2" onclick="switchServer('vidsrccc2')">
                    <span class="s-dot"></span>VidSrc CC
                </button>
                <button class="s-chip" data-server="twoembed" onclick="switchServer('twoembed')">
                    <span class="s-dot"></span>2Embed
                </button>
                <button class="s-chip" data-server="smashystream" onclick="switchServer('smashystream')">
                    <span class="s-dot"></span>Smashy
                </button>
                <button class="s-chip" data-server="autoembed" onclick="switchServer('autoembed')">
                    <span class="s-dot"></span>AutoEmbed
                </button>
            </div>
        </div>

        <!-- Show Overview -->
        <div class="show-overview-box" id="show-overview-box" style="display:none">
            <p id="show-overview-text"></p>
        </div>

    </div>

    <!-- EPISODES COLUMN -->
    <div class="episodes-column" id="episodes-column">
        <div class="ep-panel">
            <div class="ep-panel-header">
                <div class="ep-panel-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                    Episodes
                </div>
                <span class="ep-count-badge" id="episode-count">0 eps</span>
            </div>

            <!-- Season Chips -->
            <div class="season-scroll" id="season-chips"></div>

            <!-- Episode List -->
            <div class="ep-list" id="episode-grid"></div>
        </div>
    </div>

</div>

<script src="engine.js"></script>
</body>
</html>
