<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFlix — Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="grid-overlay"></div>
</div>

<nav class="top-nav">
    <a href="https://v0-netflix-homepage-clone-f2pi.vercel.app/" class="nav-logo">
        <div class="logo-gem">
            <span>A</span>
        </div>
        <span class="logo-text">AURA<span class="logo-accent">FLIX</span></span>
    </a>

    <div class="search-wrap">
        <svg class="search-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search movies, shows..." autocomplete="off">
        <kbd class="search-kbd">ESC</kbd>
        <div id="search-results" class="search-dropdown"></div>
    </div>

    <div class="nav-right">
        <span id="show-title-nav" class="nav-show-title"></span>
        <div class="nav-pill">
            <span class="nav-pill-dot"></span>
            <span>LIVE</span>
        </div>
    </div>
</nav>

<div class="app-layout">

    <div class="player-column">

        <div class="show-info-bar">
            <div class="show-poster-mini" id="show-poster-mini">
                <div class="poster-skeleton"></div>
            </div>
            <div class="show-meta">
                <h1 class="show-title" id="show-title">
                    <span class="skeleton-line" style="width:200px"></span>
                </h1>
                <div class="show-tags">
                    <span class="tag tag-rating" id="show-rating"></span>
                    <span class="tag tag-year" id="show-year"></span>
                    <span class="tag tag-type" id="show-type"></span>
                    <span class="tag tag-ep" id="current-ep-tag"></span>
                </div>
            </div>
            <div class="ep-nav-btns" id="ep-nav-btns">
                <button class="ep-btn" id="prev-ep-btn" onclick="prevEpisode()">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                    <span>Prev</span>
                </button>
                <button class="ep-btn ep-btn-next" id="next-ep-btn" onclick="nextEpisode()">
                    <span>Next</span>
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </div>

        <div class="player-outer">
            <div class="player-border-anim"></div>
            <div class="player-wrap">
                <div class="corner c-tl"></div>
                <div class="corner c-tr"></div>
                <div class="corner c-bl"></div>
                <div class="corner c-br"></div>
                <iframe id="main-player" src="" frameborder="0" allowfullscreen
                    allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
                    referrerpolicy="no-referrer">
                </iframe>
                <div class="player-loader" id="player-loader">
                    <div class="loader-spinner"></div>
                    <div class="loader-info">
                        <span class="loader-title">Fetching Stream</span>
                        <span class="loader-sub" id="loader-server">vidsrc</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="server-bar">
            <div class="server-label-group">
                <div class="pulse-ring">
                    <div class="pulse-dot"></div>
                </div>
                <span class="server-label-text">STREAM SOURCE</span>
            </div>
            <div class="divider-v"></div>
            <div class="server-chips" id="server-list">
                <button class="s-chip active" data-server="vidsrc" onclick="switchServer('vidsrc')">
                    <svg viewBox="0 0 6 6" width="6" height="6"><circle cx="3" cy="3" r="3" fill="currentColor"/></svg>
                    VidSrc
                </button>
                <button class="s-chip" data-server="vidsrcto" onclick="switchServer('vidsrcto')">
                    <svg viewBox="0 0 6 6" width="6" height="6"><circle cx="3" cy="3" r="3" fill="currentColor"/></svg>
                    VidSrc.to
                </button>
                <button class="s-chip" data-server="twoembed" onclick="switchServer('twoembed')">
                    <svg viewBox="0 0 6 6" width="6" height="6"><circle cx="3" cy="3" r="3" fill="currentColor"/></svg>
                    2Embed
                </button>
                <button class="s-chip" data-server="moviesapi" onclick="switchServer('moviesapi')">
                    <svg viewBox="0 0 6 6" width="6" height="6"><circle cx="3" cy="3" r="3" fill="currentColor"/></svg>
                    MoviesAPI
                </button>
                <button class="s-chip" data-server="nontongo" onclick="switchServer('nontongo')">
                    <svg viewBox="0 0 6 6" width="6" height="6"><circle cx="3" cy="3" r="3" fill="currentColor"/></svg>
                    NontonGo
                </button>
            </div>
        </div>

        <div class="overview-card" id="show-overview-box" style="display:none">
            <div class="overview-label">
                <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                SYNOPSIS
            </div>
            <p id="show-overview-text"></p>
        </div>

    </div>

    <div class="episodes-column" id="episodes-column">
        <div class="ep-panel">
            <div class="ep-panel-top">
                <div class="ep-panel-title">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                    EPISODES
                </div>
                <span class="ep-badge" id="episode-count">— eps</span>
            </div>
            <div class="season-rail" id="season-chips"></div>
            <div class="ep-scroll" id="episode-grid"></div>
        </div>
    </div>

</div>

<script src="engine.js"></script>
</body>
</html>
