<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFlix — Watch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AMBIENT ORBS -->
<div class="ambient-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
</div>

<!-- TOP NAV -->
<nav class="top-nav">
    <a href="https://v0-netflix-homepage-clone.vercel.app" class="nav-logo">
        <div class="logo-icon">A</div>
        <span class="logo-text">AURA<span class="logo-accent">FLIX</span></span>
    </a>
    <div class="search-wrap">
        <svg class="search-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search movies, shows..." autocomplete="off">
        <div id="search-results" class="search-dropdown"></div>
    </div>
    <div class="nav-right">
        <span id="show-title-nav" class="nav-show-title"></span>
        <div class="nav-badge">4K</div>
    </div>
</nav>

<!-- LAYOUT -->
<div class="app-layout">

    <!-- PLAYER COLUMN -->
    <div class="player-column">

        <!-- Info Bar -->
        <div class="show-info-bar">
            <div class="show-info-left">
                <div class="show-poster-mini" id="show-poster-mini"></div>
                <div class="show-meta">
                    <h1 class="show-title" id="show-title">Loading...</h1>
                    <div class="show-tags">
                        <span class="tag tag-rating" id="show-rating"></span>
                        <span class="tag tag-year" id="show-year"></span>
                        <span class="tag tag-type" id="show-type"></span>
                        <span class="tag tag-ep" id="current-ep-tag"></span>
                    </div>
                </div>
            </div>
            <div class="ep-nav-btns" id="ep-nav-btns">
                <button class="ep-nav-btn" id="prev-ep-btn" onclick="prevEpisode()">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                    Prev
                </button>
                <button class="ep-nav-btn ep-next" id="next-ep-btn" onclick="nextEpisode()">
                    Next
                    <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </div>

        <!-- PLAYER FRAME -->
        <div class="player-wrap">
            <div class="player-glow-ring"></div>
            <div class="corner-tl"></div>
            <div class="corner-tr"></div>
            <div class="corner-bl"></div>
            <div class="corner-br"></div>
            <iframe id="main-player" src="" frameborder="0" allowfullscreen
                allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
                referrerpolicy="no-referrer">
            </iframe>
            <div class="player-loader" id="player-loader">
                <div class="loader-ring"></div>
                <p class="loader-txt">Fetching stream<span class="dot-anim">...</span></p>
            </div>
        </div>

        <!-- SERVER BAR -->
        <div class="server-bar">
            <div class="server-label-wrap">
                <span class="live-dot"></span>
                <span class="server-label-txt">STREAM SOURCE</span>
            </div>
            <div class="server-chips" id="server-list">
                <button class="s-chip active" data-server="vidsrc" onclick="switchServer('vidsrc')">
                    <span class="chip-dot"></span>VidSrc
                </button>
                <button class="s-chip" data-server="vidsrcto" onclick="switchServer('vidsrcto')">
                    <span class="chip-dot"></span>VidSrc.to
                </button>
                <button class="s-chip" data-server="twoembed" onclick="switchServer('twoembed')">
                    <span class="chip-dot"></span>2Embed
                </button>
                <button class="s-chip" data-server="moviesapi" onclick="switchServer('moviesapi')">
                    <span class="chip-dot"></span>MoviesAPI
                </button>
                <button class="s-chip" data-server="nontongo" onclick="switchServer('nontongo')">
                    <span class="chip-dot"></span>NontonGo
                </button>
            </div>
        </div>

        <!-- OVERVIEW -->
        <div class="overview-box" id="show-overview-box" style="display:none">
            <div class="overview-header">
                <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                OVERVIEW
            </div>
            <p id="show-overview-text"></p>
        </div>

    </div>

    <!-- EPISODES COLUMN -->
    <div class="episodes-column" id="episodes-column">
        <div class="ep-panel">
            <div class="ep-panel-header">
                <div class="ep-panel-title">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
                    EPISODES
                </div>
                <span class="ep-count-badge" id="episode-count">— eps</span>
            </div>
            <div class="season-scroll" id="season-chips"></div>
            <div class="ep-list" id="episode-grid"></div>
        </div>
    </div>

</div>
<script src="engine.js"></script>
</body>
</html>
